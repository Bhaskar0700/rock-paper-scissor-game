<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<title>Ananya vs Bhaskar - Rock Paper Scissors</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<img src="img/rock-paper-scissor.jpg" class="game-image">

<h1>Rock Paper Scissors</h1>

<div class="glass-panel">

<div class="scoreboard">
Ananya : <span id="user-score">0</span>
|
Bhaskar : <span id="computer-score">0</span>
</div>

<h2>Ananya Choice : <span id="user-choice">_</span></h2>
<h2>Bhaskar Choice : <span id="computer-choice">_</span></h2>

<h2 id="result">Ananya, make your move 🎮</h2>

<h3 id="hint">
Hint: Rock beats Scissors, Scissors beats Paper, Paper beats Rock
</h3>

</div>

<div class="buttons">
<button id="rock">🪨 Rock</button>
<button id="paper">📄 Paper</button>
<button id="scissors">✂ Scissors</button>
</div>

<button id="reset">🔄 Reset Game</button>

<!-- AUDIO -->

<audio id="rock-hover" src="audio/rockhover-cartoon-whistling-738.wav"></audio>
<audio id="rock-win" src="audio/rockWin-laughing-cartoon-creature-414.wav"></audio>

<audio id="ananya-win" src="audio/ananywinCricket.wav"></audio>
<audio id="bhaskar-win" src="audio/bhaskarWin-cartoon-monkey-mocking-laugh-107.wav"></audio>

<audio id="lose-sound" src="audio/lose-cartoon-kitty-begging-meow-92.wav"></audio>
<audio id="draw-sound" src="audio/draw-sound-long-loving-kiss-2195.wav"></audio>

<audio id="reset-sound" src="audio/reset-magic-notification-ring.wav"></audio>

<script src="app.js"></script>

</div>

</body>
</html>
